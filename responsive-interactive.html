<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive Interactive Preview - Peter H. Vartanian</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #6f6b63;
        --soft: #8b867c;
        --paper: #fbfaf7;
        --canvas: #efede7;
        --panel: #f7f5ef;
        --line: #ddd9cf;
        --line-strong: #c9c3b8;
        --accent: #252525;
        --blue: #5b78a7;
        --rose: #a35c78;
        --shadow: rgba(43, 38, 30, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--canvas);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 24px;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(251, 250, 247, 0.94);
        backdrop-filter: blur(12px);
      }

      .title {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.15;
        font-weight: 700;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: end;
        align-items: center;
      }

      .segmented,
      .actions {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .page-nav {
        max-width: 528px;
      }

      .control-btn,
      .page-btn {
        min-height: 34px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        transition:
          background 150ms ease,
          color 150ms ease,
          transform 150ms ease;
      }

      .page-btn {
        padding: 0 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 690;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .control-btn {
        width: 34px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        color: var(--muted);
        font-size: 17px;
        line-height: 1;
      }

      .page-btn:hover,
      .control-btn:hover {
        background: #ebe7df;
        color: var(--ink);
      }

      .page-btn[aria-pressed="true"],
      .control-btn[aria-pressed="true"] {
        background: var(--accent);
        color: var(--paper);
      }

      .control-btn:active,
      .page-btn:active {
        transform: translateY(1px);
      }

      .viewport-select {
        height: 44px;
        padding: 0 36px 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        font-size: 13px;
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(640px, 1fr) 450px;
        gap: 24px;
        align-items: start;
        padding: 24px;
      }

      .device {
        min-width: 0;
      }

      .device-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 18px;
        min-height: 28px;
        margin-bottom: 12px;
      }

      .device-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 1.2;
      }

      .device-size {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
        white-space: nowrap;
      }

      .desktop-shell {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--paper);
        box-shadow: 0 18px 40px var(--shadow);
      }

      .desktop-browser {
        position: absolute;
        inset: 0;
      }

      .phone-shell {
        width: 438px;
        margin-inline: auto;
        padding: 18px;
        border-radius: 42px;
        background:
          linear-gradient(135deg, #292929, #101010 58%, #252525),
          #181818;
        box-shadow: 0 18px 40px rgba(43, 38, 30, 0.22);
      }

      .phone-inner {
        position: relative;
        width: 402px;
        height: 874px;
        overflow: hidden;
        border: 1px solid #0d0d0d;
        border-radius: 29px;
        background: var(--paper);
      }

      .phone-notch {
        position: absolute;
        top: 10px;
        left: 50%;
        z-index: 5;
        width: 116px;
        height: 31px;
        border-radius: 20px;
        background: #111;
        transform: translateX(-50%);
        pointer-events: none;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--paper);
      }

      .desktop-shell iframe {
        width: 1440px;
        height: 900px;
        transform-origin: top left;
      }

      .phone-inner iframe {
        width: 402px;
        height: 874px;
      }

      .hidden {
        display: none;
      }

      .status {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .range-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .range-wrap span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      .range-wrap input {
        width: 112px;
        accent-color: var(--accent);
      }

      @media (max-width: 1280px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .controls {
          justify-content: start;
        }

        .stage {
          grid-template-columns: 1fr;
        }

        .phone-shell {
          margin-inline: 0;
        }
      }

      @media (max-width: 760px) {
        .topbar,
        .stage {
          padding-inline: 14px;
        }

        .page-nav {
          overflow-x: auto;
          max-width: 100%;
        }

        .range-wrap {
          width: 100%;
        }

        .range-wrap input {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title">
          <h1>Peter H. Vartanian site</h1>
          <p class="subtitle">Interactive responsive preview</p>
        </div>

        <div class="controls" aria-label="Preview controls">
          <nav class="segmented page-nav" aria-label="Site page">
            <button class="page-btn" type="button" data-path="/" aria-pressed="true">Home</button>
            <button class="page-btn" type="button" data-path="/cv/">CV</button>
            <button class="page-btn" type="button" data-path="/portfolio/">Portfolio</button>
            <button class="page-btn" type="button" data-path="/artifacts/">Artifacts</button>
            <button class="page-btn" type="button" data-path="/contact/">Contact</button>
          </nav>

          <select class="viewport-select" id="layoutMode" aria-label="Viewport layout">
            <option value="both">Desktop and mobile</option>
            <option value="desktop">Desktop only</option>
            <option value="mobile">Mobile only</option>
          </select>

          <div class="actions" aria-label="Frame actions">
            <button class="control-btn" type="button" id="syncToggle" aria-label="Sync scroll" aria-pressed="true">⇅</button>
            <button class="control-btn" type="button" id="topButton" aria-label="Scroll to top">↑</button>
            <button class="control-btn" type="button" id="reloadButton" aria-label="Reload frames">↻</button>
          </div>

          <label class="range-wrap" for="scaleRange">
            <span>Scale</span>
            <input id="scaleRange" type="range" min="50" max="100" step="1" value="100" />
          </label>
        </div>
      </header>

      <section class="stage" id="stage" aria-label="Responsive preview stage">
        <article class="device desktop-device" id="desktopDevice">
          <div class="device-head">
            <div class="device-title">Desktop - MacBook</div>
            <div class="device-size">1440 x 900 viewport</div>
          </div>
          <div class="desktop-shell" id="desktopShell">
            <div class="desktop-browser" id="desktopBrowser">
              <iframe id="desktopFrame" title="Desktop preview" src="/"></iframe>
            </div>
          </div>
          <div class="status" id="desktopStatus"></div>
        </article>

        <article class="device mobile-device" id="mobileDevice">
          <div class="device-head">
            <div class="device-title">Mobile - iPhone Pro</div>
            <div class="device-size">402 x 874 viewport</div>
          </div>
          <div class="phone-shell">
            <div class="phone-inner">
              <div class="phone-notch" aria-hidden="true"></div>
              <iframe id="mobileFrame" title="Mobile preview" src="/"></iframe>
            </div>
          </div>
          <div class="status" id="mobileStatus"></div>
        </article>
      </section>
    </main>

    <script>
      const pages = Array.from(document.querySelectorAll(".page-btn"));
      const desktopFrame = document.querySelector("#desktopFrame");
      const mobileFrame = document.querySelector("#mobileFrame");
      const desktopShell = document.querySelector("#desktopShell");
      const desktopBrowser = document.querySelector("#desktopBrowser");
      const desktopDevice = document.querySelector("#desktopDevice");
      const mobileDevice = document.querySelector("#mobileDevice");
      const stage = document.querySelector("#stage");
      const layoutMode = document.querySelector("#layoutMode");
      const scaleRange = document.querySelector("#scaleRange");
      const syncToggle = document.querySelector("#syncToggle");
      const topButton = document.querySelector("#topButton");
      const reloadButton = document.querySelector("#reloadButton");
      const desktopStatus = document.querySelector("#desktopStatus");
      const mobileStatus = document.querySelector("#mobileStatus");

      const frameState = new WeakMap();
      let currentPath = "/";
      let syncEnabled = true;
      let isSyncing = false;

      function pageForLocation(location) {
        const path = location.pathname.replace(/\/index\.html$/, "/");
        if (path.startsWith("/cv")) return "/cv/";
        if (path.startsWith("/portfolio")) return "/portfolio/";
        if (path.startsWith("/artifacts")) return "/artifacts/";
        if (path.startsWith("/contact")) return "/contact/";
        return "/";
      }

      function updateButtons(path) {
        pages.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.path === path));
        });
      }

      function setFrames(path) {
        currentPath = path;
        updateButtons(path);
        desktopFrame.src = path;
        mobileFrame.src = path;
      }

      function scrollRatio(win) {
        const doc = win.document.documentElement;
        const max = Math.max(0, doc.scrollHeight - win.innerHeight);
        return max === 0 ? 0 : win.scrollY / max;
      }

      function setScrollRatio(frame, ratio) {
        const win = frame.contentWindow;
        const doc = win.document.documentElement;
        const max = Math.max(0, doc.scrollHeight - win.innerHeight);
        win.scrollTo({ top: max * ratio, left: 0, behavior: "auto" });
      }

      function readablePercent(value) {
        return `${Math.round(value * 100)}%`;
      }

      function updateStatus(frame, element) {
        const win = frame.contentWindow;
        const doc = win.document.documentElement;
        const max = Math.max(0, doc.scrollHeight - win.innerHeight);
        const ratio = max === 0 ? 0 : win.scrollY / max;
        element.textContent = max === 0 ? "Page fits in this viewport." : `Scrolled ${readablePercent(ratio)}.`;
      }

      function wireFrame(frame, statusElement) {
        try {
          const win = frame.contentWindow;
          const doc = win.document;
          frameState.set(frame, { ready: true });
          doc.documentElement.style.scrollBehavior = "auto";
          updateStatus(frame, statusElement);

          doc.addEventListener("click", (event) => {
            const anchor = event.target.closest("a[href]");
            if (!anchor) return;
            const url = new URL(anchor.href);
            if (url.origin !== window.location.origin) {
              anchor.target = "_blank";
              anchor.rel = "noopener";
              return;
            }
            const nextPath = pageForLocation(url);
            event.preventDefault();
            setFrames(nextPath);
          });

          win.addEventListener("scroll", () => {
            updateStatus(frame, statusElement);
            if (!syncEnabled || isSyncing) return;
            const otherFrame = frame === desktopFrame ? mobileFrame : desktopFrame;
            if (!frameState.get(otherFrame)?.ready) return;
            isSyncing = true;
            setScrollRatio(otherFrame, scrollRatio(win));
            window.requestAnimationFrame(() => {
              isSyncing = false;
              updateStatus(otherFrame, otherFrame === desktopFrame ? desktopStatus : mobileStatus);
            });
          }, { passive: true });
        } catch {
          frameState.set(frame, { ready: false });
          statusElement.textContent = "Preview loaded.";
        }
      }

      function applyDesktopScale() {
        const requestedScale = Number(scaleRange.value) / 100;
        const availableWidth = desktopDevice.clientWidth || 1440;
        const scale = Math.min(requestedScale, availableWidth / 1440);
        desktopBrowser.style.transform = `scale(${scale})`;
        desktopShell.style.width = `${1440 * scale}px`;
        desktopShell.style.height = `${900 * scale}px`;
      }

      function applyLayoutMode() {
        const mode = layoutMode.value;
        desktopDevice.classList.toggle("hidden", mode === "mobile");
        mobileDevice.classList.toggle("hidden", mode === "desktop");
        stage.style.gridTemplateColumns =
          mode === "both" ? "minmax(640px, 1fr) 450px" : "minmax(320px, 1fr)";
      }

      pages.forEach((button) => {
        button.addEventListener("click", () => setFrames(button.dataset.path));
      });

      layoutMode.addEventListener("change", applyLayoutMode);
      scaleRange.addEventListener("input", applyDesktopScale);

      syncToggle.addEventListener("click", () => {
        syncEnabled = !syncEnabled;
        syncToggle.setAttribute("aria-pressed", String(syncEnabled));
      });

      topButton.addEventListener("click", () => {
        [desktopFrame, mobileFrame].forEach((frame) => {
          if (!frameState.get(frame)?.ready) return;
          frame.contentWindow.scrollTo({ top: 0, left: 0, behavior: "smooth" });
        });
      });

      reloadButton.addEventListener("click", () => {
        desktopFrame.contentWindow.location.reload();
        mobileFrame.contentWindow.location.reload();
      });

      desktopFrame.addEventListener("load", () => wireFrame(desktopFrame, desktopStatus));
      mobileFrame.addEventListener("load", () => wireFrame(mobileFrame, mobileStatus));

      window.addEventListener("resize", applyDesktopScale);
      applyDesktopScale();
      applyLayoutMode();
    </script>
  </body>
</html>
