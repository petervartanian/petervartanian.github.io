<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Pages - Mobile Preview</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: #efede7;
        --ink: #15161a;
        --muted: #666;
        --paper: #fbfaf7;
        --bezel: #171717;
        --edge: #0d0d0d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--canvas);
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .page {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(438px, 1fr));
        gap: 28px;
        align-items: start;
        justify-items: center;
        padding: 24px;
      }

      .preview {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .label {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.12em;
        line-height: 1;
        text-transform: uppercase;
      }

      .label:hover {
        color: var(--ink);
      }

      .phone {
        width: 438px;
        height: 910px;
        padding: 18px;
        border-radius: 42px;
        background:
          linear-gradient(135deg, #292929, #101010 58%, #252525),
          var(--bezel);
        box-shadow: 0 20px 46px rgba(43, 38, 30, 0.24);
      }

      .screen {
        position: relative;
        width: 402px;
        height: 874px;
        overflow: hidden;
        border: 1px solid var(--edge);
        border-radius: 29px;
        background: var(--paper);
      }

      .notch {
        display: none;
        position: absolute;
        top: 10px;
        left: 50%;
        z-index: 2;
        width: 116px;
        height: 31px;
        border-radius: 20px;
        background: #111;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .frame-lock {
        position: absolute;
        inset: 0;
        z-index: 3;
        cursor: default;
      }

      iframe {
        display: block;
        width: 402px;
        height: 874px;
        border: 0;
        background: var(--paper);
      }

      @media (max-width: 520px) {
        .page {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .preview {
          width: 100%;
          overflow-x: auto;
          padding-bottom: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="All mobile page previews">
      <section class="preview">
        <a class="label" href="/iphone17pro.html?path=/">Home</a>
        <div class="phone">
          <div class="screen">
            <div class="notch" aria-hidden="true"></div>
            <iframe title="Home page mobile preview" src="/?mobile-preview=133"></iframe>
            <div class="frame-lock" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="preview">
        <a class="label" href="/iphone17pro.html?path=/cv/">Curriculum Vitæ</a>
        <div class="phone">
          <div class="screen">
            <div class="notch" aria-hidden="true"></div>
            <iframe title="CV page mobile preview" src="/cv/?mobile-preview=133"></iframe>
            <div class="frame-lock" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="preview">
        <a class="label" href="/iphone17pro.html?path=/portfolio/">Portfolio</a>
        <div class="phone">
          <div class="screen">
            <div class="notch" aria-hidden="true"></div>
            <iframe title="Portfolio page mobile preview" src="/portfolio/?mobile-preview=133"></iframe>
            <div class="frame-lock" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="preview">
        <a class="label" href="/iphone17pro.html?path=/artifacts/">Artifacts</a>
        <div class="phone">
          <div class="screen">
            <div class="notch" aria-hidden="true"></div>
            <iframe title="Artifacts page mobile preview" src="/artifacts/?mobile-preview=133"></iframe>
            <div class="frame-lock" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="preview">
        <a class="label" href="/iphone17pro.html?path=/contact/">Contact</a>
        <div class="phone">
          <div class="screen">
            <div class="notch" aria-hidden="true"></div>
            <iframe title="Contact page mobile preview" src="/contact/?mobile-preview=133"></iframe>
            <div class="frame-lock" aria-hidden="true"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      for (const frame of document.querySelectorAll("iframe")) {
        frame.addEventListener("load", () => {
          const doc = frame.contentDocument;
          if (!doc) return;

          doc.addEventListener("click", (event) => {
            const anchor = event.target.closest("a[href]");
            if (!anchor) return;

            const url = new URL(anchor.href);
            event.preventDefault();

            if (url.origin === window.location.origin) return;

            anchor.target = "_blank";
            anchor.rel = "noopener";
            window.open(url.href, "_blank", "noopener");
          });
        });
      }
    </script>
  </body>
</html>
